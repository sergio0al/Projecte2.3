<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="stylesheet" href="style.css">
    <title>Porjecte2 - Checkout</title>
</head>



<body>

    <header>
        <div>
            <a href="index.html"><img src="images/logo.png" alt=""></a>
        </div>

        <nav class="nav-buttons">
            <img src="images/notificationgray.svg" alt="Notification" width="24px" height="24px" class="notify">
            <img src="images/avatar.png" alt="Avatar" width="44px" height="44px" class="avatar">
        </nav>
    </header>



    <main class="checkout">


        <div class="margin">
            <h1 class="title">Secure your reservation</h1>
            
            <section class="warning">
                <img src="images/warning.png" alt="warning">
                <p>Check the latest COVID-19 restrictions before you travel. <a href="#" class="link"><span>Learn more</span></a></p>
            </section>


            <form action="#" class="checkout-form">

                <div class="left">

                    <h2 class="legend"><img src="images/icons/securityuser.svg"><span>Room 1</span> 2 adults, 1 double bed and 1 twin bed, Non-smoking</h2>
                    <fieldset>
                        <div class="row">
                            <div>
                                <label for="first-name">First name</label>
                                <input type="text" id="first-name" name="first-name" required autofocus>
                            </div>

                            <div>
                                <label for="first-name">Last name</label>
                                <input type="text" id="first-name" name="first-name" required>
                            </div>
                        </div>

                        <div class="row">

                            <div>
                                <label for="first-name">Mobile number</label>
                                <img src="images/flags/61.png" class="flag" id="ingland" alt="United Kingdom">
                                <img src="images/icons/flecha.svg" class="flecha" alt="Arrow" width="13px" height="11px">
                                <select>
                                    <option onclick="texto.style.opacity = 0.5">+61</option>
                                    <option>+52</option>
                                    <option>+34</option>
                                </select>
                            </div>
                                
                            <input type="tel">

                        </div>

                        <input type="checkbox" id="text-alerts" name="text-alerts">
                        <label for="text-alerts" class="checkbox">Receive text alerts about this trip.</label>

                    </fieldset>

                    <div class="divider">
                        <h2 class="legend"><img src="images/icons/card-tick.svg"><span>Payment options</span></h2>
                        <fieldset>
                            
                            <div class="option">
                                <p class="select">Debit/Credit Card</p>
                                <p>Paypal</p>
                                <p>Bank transfer</p>
                            </div>


                            <div class="row">
                                <div>
                                    <label for="">Name on card</label>
                                    <input type="text" id="name-on-card" name="name-on-card" required>
                                </div>
                            </div>

                            <input type="checkbox" id="text-alerts" name="text-alerts">
                            <label for="text-alerts" class="checkbox">Receive text alerts about this trip.</label>

                        </fieldset>
                    </div>

                </div>

                <div class="right">

                </div>
            </form>
        </div>


        <h3 class="espacio" style="padding-top: 400px;">Payment details</h3>
    </main>




</body>
</html>
