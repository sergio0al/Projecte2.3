<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Porjecte2 - Forgot Password</title>
</head>
<body>
    <header>
        <div>
            <a href="index.html"><img src="images/logo.png" alt=""></a>
        </div>
    </header>

    <main class="formularios">
        <form action="Check-inbox.html">
            <h2 class="title-forgot">Forgot your password?</h2>
            <p class="subtitle">We’ll send you a link to reset it. Enter your email address<br> used for My Dream Place</p>
            <div class="input-div">
                <label for="password">Your email address</label>
                <input type="password" name="password" id="passwords" placeholder="Enter address" required>
            </div>

            <button class="send">Send Reset Link</button>
            
            <p class="terms-text">By creating an account, you agree with our <a href="#" class="link">Terms and Conditions</a> and <a href="#" class="link">Privacy Statement.</a></p>
        </form>
    </main>

</body>
</html>
