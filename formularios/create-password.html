<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../images/favicon.png">
    <link rel="stylesheet" href="../style.css">
    <title>Porjecte2 - Create Password</title>
</head>
<body>
    <header>
        <div>
            <a href="../index.html"><img src="../images/logo.png" alt=""></a>
        </div>
    </header>

    <main class="formularios">
        <form>
            <h2 class="title">Create password</h2>
            <p class="subtitle">Use a minimum of 10 characters, including letters,<br> lowercase letters, and numbers.</p>
            <div class="input-div">
                <label for="passwords">Password</label>
                <input type="password" name="password" id="passwords" placeholder="Enter password" required minlength="10" pattern="(?=.*[a-z])(?=.*[A-Za-z])(?=.*\d).{10,}"  title="Use a minimum of 10 characters, including letters,
lowercase letters, and numbers." />
            </div>

            <div class="input-div">
                <label for="rep-password" class="password">Confirm password</label>
                <input type="password" name="rep-password" id="rep-password" placeholder="Enter password" required minlength="10" pattern="(?=.*[a-z])(?=.*[A-Za-z])(?=.*\d).{10,}"  title="Use a minimum of 10 characters, including letters,
lowercase letters, and numbers." /> 
            </div>

            <button class="send">Create account</button>
            
            <p class="terms-text">By creating an account, you agree with our <a href="#" class="link">Terms and Conditions</a> and <a href="#" class="link">Privacy Statement.</a></p>
        </form>
    </main>

</body>
</html>
