<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Porjecte2 - Register</title>
</head>
<body>
    <header>
        <div>
            <a href="index.html"><img src="images/logo.png" alt=""></a>
        </div>
    </header>

    <main class="formularios">
        <form action="create-password.html">
            <h2 class="title">Register</h2>
            
            <div class="input-div">
                <label id="email">Email address</label>
                <input type="text" name="email" id="email" placeholder="Email address" required>
            </div>

            <button class="send">Continue with email</button>
            
            <div class="divisor">
                <hr>
                <p>or use one of these options</p>
                <hr>
            </div>
            
            <button class="google"><img src="images/google.png">Continue with Google</button>
            <button class="facebook"><img src="images/facebook.png">Continue with Facebook</button>
            
            <p>Already have an account? <a href="signin.html" class="link">Sign in</a></p>
        </form>
    </main>

</body>
</html>
